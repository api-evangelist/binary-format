aid: binary-format
name: Binary Format
description: >-
  Binary format refers to data encoding and serialization methods that use
  binary rather than text representations, including formats like Protocol
  Buffers, MessagePack, Avro, Thrift, CBOR, and others used in APIs and
  data storage systems for efficiency. Binary formats offer significant
  advantages over text-based formats in terms of size, parsing speed, and
  type safety.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Binary Format
  - Data Encoding
  - Protocol Buffers
  - Serialization
  - MessagePack
  - Apache Avro
  - Apache Thrift
  - CBOR
url: >-
  https://raw.githubusercontent.com/api-evangelist/binary-format/refs/heads/main/apis.yml
created: '2025-01-01'
modified: '2026-04-21'
